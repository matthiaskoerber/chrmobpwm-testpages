<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application | The Monolith Lofts</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            padding: 40px;
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 200;
            letter-spacing: 10px;
            text-transform: uppercase;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .form-container {
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-weight: 300;
            font-size: 1.2rem;
            margin-bottom: 40px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        form { 
            border-left: 1px solid #333; 
            padding-left: 30px; 
            margin-bottom: 60px;
        }
        .form-group { 
            margin-bottom: 30px; 
        }
        input { 
            background: transparent;
            color: #fff;
            border: none; 
            border-bottom: 1px solid #444; 
            width: 100%; 
            outline: none; 
            padding: 10px 0; 
            font-size: 1rem;
            font-weight: 300;
            transition: border-color 0.3s;
        }
        input:focus { 
            border-bottom-color: #fff; 
        }
        label { 
            font-size: 14px; 
            text-transform: uppercase; 
            color: #888; 
            letter-spacing: 2px;
            display: block;
            margin-bottom: 8px;
        }
        button { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 15px 40px; 
            cursor: pointer; 
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 3px;
            width: 100%;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.8;
        }
        footer {
            padding: 40px;
            text-align: center;
            font-size: 10px;
            color: #555;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .next-link-container {
            margin-bottom: 40px;
        }
        .next-link {
            color: #888;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 2px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            transition: color 0.3s, border-color 0.3s;
        }
        .next-link:hover {
            color: #fff;
            border-color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Monolith</div>
    </header>

    <main>
        <div class="form-container">
            <div style="margin-bottom: 40px; text-align: center;">
                <img src="pics/app3.jpg" alt="Loft Space" style="max-width: 100%; max-height: 300px; width: 100%; object-fit: cover; filter: grayscale(100%); opacity: 0.7; transition: opacity 0.4s ease, filter 0.4s ease;" onmouseover="this.style.opacity=1; this.style.filter='grayscale(0%)';" onmouseout="this.style.opacity=0.7; this.style.filter='grayscale(100%)';">
            </div>
            <h1>Lease Application</h1>
            <form>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="applicant_fullname">
                </div>
                <div class="form-group">
                    <label>Mobile</label>
                    <input type="text" name="mobile_no">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" name="email_id">
                </div>
                <div class="form-group">
                    <label>Current City</label>
                    <input type="text" name="current_city">
                </div>
                <div class="form-group">
                    <label>Annual Income</label>
                    <input type="text" name="total_income_amount" placeholder="USD">
                </div>
                <div class="form-group">
                    <label>move-in month</label>
                    <input type="text" name="move_in_date" placeholder="e.g. January">
                </div>
                <div class="form-group">
                    <label>Occupants</label>
                    <input type="text" name="occupant_details">
                </div>
                <button type="submit">Submit Application</button>
            </form>
            
            <div class="next-link-container" style="text-align: center;">
                <a href="form_formal.html" class="next-link">Formal Portal &rarr;</a>
            </div>
        </div>
    </main>
    
    <footer>
        &copy; 2026 Monolith Living. Curated Spaces.
    </footer>
</body>
</html>
