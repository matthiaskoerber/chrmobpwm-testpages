<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        form { border-left: 2px solid #000; padding-left: 20px; width: 300px; }
        div { margin-bottom: 20px; }
        input { border: none; border-bottom: 1px solid #000; width: 100%; outline: none; padding: 5px 0; }
        label { font-size: 12px; text-transform: uppercase; color: #666; }
        button { background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <form>
        <div>
            <label>Name</label>
            <input type="text" name="applicant_fullname">
        </div>
        <div>
            <label>Mobile</label>
            <input type="text" name="mobile_no">
        </div>
        <div>
            <label>Email</label>
            <input type="text" name="email_id">
        </div>
        <div>
            <label>Current City</label>
            <input type="text" name="current_city">
        </div>
        <div>
            <label>Total Income</label>
            <input type="text" name="total_income_amount">
        </div>
        <div>
            <label>Move-in Date</label>
            <input type="text" name="move_in_date">
        </div>
        <div>
            <label>Occupant Details</label>
            <input type="text" name="occupant_details">
        </div>
        <button type="submit">Apply</button>
    </form>
    <div style="margin-top: 20px; text-align: center; width: 100%;"><a href="form_formal.html">Next Form (Formal)</a></div>
</body>
</html>
