<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rent Our Place!</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #eef; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; border: 2px solid #99f; }
        h1 { text-align: center; color: #55a; }
        p { margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #99f; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #99f; color: #fff; border: none; border-radius: 10px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Interested in our flat?</h1>
        <p>Fill this out and we'll get back to you!</p>
        <form>
            <p>
                <label>When do you want to move?</label>
                <input type="text" name="target_move_in">
            </p>
            <p>
                <label>What's your name?</label>
                <input type="text" name="your_name">
            </p>
            <p>
                <label>How can we reach you by email?</label>
                <input type="text" name="contact_email">
            </p>
            <p>
                <label>Your cell phone number:</label>
                <input type="text" name="cell_phone">
            </p>
            <p>
                <label>How much do you make a year?</label>
                <input type="text" name="yearly_income">
            </p>
            <p>
                <label>Where are you living right now?</label>
                <input type="text" name="where_do_you_live_now">
            </p>
            <p>
                <label>Who else is coming with you?</label>
                <input type="text" name="who_is_living_with_you">
            </p>
            <p>
                <label>Got any pets? (Let us know!)</label>
                <input type="text" name="any_pets">
            </p>
            <button type="button" onclick="fillExampleData()">Fill with Example Data</button>
            <button type="submit">Send Message!</button>
        </form>
        <div style="margin-top: 20px; text-align: center;"><a href="form_minimalist.html">Next Form (Minimalist)</a></div>
    </div>
    <script>
        function fillExampleData() {
            document.querySelector('input[name="target_move_in"]').value = '2026-06-01';
            document.querySelector('input[name="your_name"]').value = 'John Doe';
            document.querySelector('input[name="contact_email"]').value = 'john.doe@example.com';
            document.querySelector('input[name="cell_phone"]').value = '555-123-4567';
            document.querySelector('input[name="yearly_income"]').value = '75000';
            document.querySelector('input[name="where_do_you_live_now"]').value = '123 Main St, New York City, USA';
            document.querySelector('input[name="who_is_living_with_you"]').value = 'Jane Doe (Partner), Max (Dog)';
            document.querySelector('input[name="any_pets"]').value = 'Yes, one dog named Max';
        }
    </script>
</body>
</html>
    </div>
</body>
</html>
